<style>
body {
  margin: 0;
  font-family: "Poppins", sans-serif;
  background: linear-gradient(135deg, #141e30, #243b55);
  color: white;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

.container {
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(12px);
  padding: 30px;
  border-radius: 20px;
  width: 520px;
  text-align: center;
  max-height: 90vh;
  overflow-y: auto;
}

button {
  padding: 10px 15px;
  border-radius: 12px;
  border: none;
  background: linear-gradient(135deg, #6a9cff, #7d5fff);
  color: white;
  cursor: pointer;
  margin: 5px;
}

button:hover { transform: scale(1.05); }

input {
  padding: 10px;
  border-radius: 10px;
  border: none;
  margin: 5px;
}

.hidden { display: none; }

label {
  display: block;
  margin: 3px;
  cursor: pointer;
}
</style>
</head>

<div class="container">

<h1>Imposter Pro</h1>

<div id="setup">

<button onclick="clearPlayers()">Nulstil</button>

<ul id="playerList"></ul>

<h3>Kategorier</h3>

<!-- ORIGINAL -->
<label><input type="checkbox" value="film"> Film</label>
<label><input type="checkbox" value="football"> Fodbold</label>

<label><input type="checkbox" value="gaming"> Gaming</label>

<h3>Sværhedsgrad</h3>

<h3>Antal impostere</h3>

<button onclick="autoImposters()">Auto</button>
<button onclick="startGame()">Start</button>

</div>

<div id="reveal" class="hidden">
<h2 id="currentPlayer"></h2>

<h3 id="secretWord" class="hidden"></h3>

<button id="revealBtn" onclick="revealWord()">Vis ord</button>
<button id="nextBtn" class="hidden" onclick="nextPlayer()">Næste spiller</button>
</div>

<div id="game" class="hidden">
<h2>Beskriv jeres ord</h2>
<button onclick="startVoting()">Afstemning</button>
</div>

<div id="voting" class="hidden">
<h2>Hvem er anderledes?</h2>

</div>

<div id="result" class="hidden">
<h2 id="resultText"></h2>
<p id="imposterList"></p>
<button onclick="location.reload()">Spil igen</button>
</div>

</div>

// RANDOM
function generateRandomPairs(count) {
  let fallback = [["Test","Test2"],["A","B"],["X","Y"]];
  let result = [];
  for (let i = 0; i < count; i++) {
    result.push(fallback[Math.floor(Math.random()*fallback.length)]);
  }
  return result;
}

// UI
function renderPlayers() {
  let list = document.getElementById("playerList");
  list.innerHTML = "";
  players.forEach(p => list.innerHTML += "<li>" + p.name + "</li>");
}
renderPlayers();

function addPlayer() {
  let name = document.getElementById("playerName").value;
  if (name) {
    players.push({ name });
    localStorage.setItem("players", JSON.stringify(players));
    renderPlayers();
    document.getElementById("playerName").value = "";
  }
}

function clearPlayers() {
  localStorage.removeItem("players");
  players = [];
  renderPlayers();
}

function autoImposters() {
  let n = players.length;
  let val = n <= 4 ? 1 : n <= 7 ? 2 : 3;
  document.getElementById("imposterInput").value = val;
}

// START GAME
function startGame() {

  if (players.length < 3) return alert("Minimum 3 spillere");

  let imposterCount = parseInt(document.getElementById("imposterInput").value);
  if (!imposterCount || imposterCount >= players.length) {
    return alert("Ugyldigt antal impostere");
  }

  let selected = Array.from(document.querySelectorAll("input[type=checkbox]:checked"))
                      .map(el => el.value);

  if (selected.length === 0) return alert("Vælg kategori");

  let diff = document.getElementById("difficulty").value;
  let diffKey = diff == 1 ? "easy" : diff == 2 ? "medium" : "hard";

  let pool = [];

  selected.forEach(cat => {

    if (cat === "random") {
      Object.keys(wordDB).forEach(key => {
        pool = pool.concat(wordDB[key][diffKey]);
      });
    }

    else if (cat === "randomHard") {
      Object.keys(wordDB).forEach(key => {
        pool = pool.concat(wordDB[key]["hard"]);
      });
    }

    else if (wordDB[cat]) {
      pool = pool.concat(wordDB[cat][diffKey]);
    }

  });

  if (pool.length === 0) return alert("Ingen ord fundet");

  chosenPair = pool[Math.floor(Math.random()*pool.length)];

  imposters = [];
  while (imposters.length < imposterCount) {
    let r = Math.floor(Math.random()*players.length);
    if (!imposters.includes(r)) imposters.push(r);
  }

  players.forEach((p,i)=>{
    p.word = imposters.includes(i) ? chosenPair[1] : chosenPair[0];
  });

  revealIndex = 0;
  switchScreen("setup","reveal");
  showWord();
}

// GAME FLOW
function showWord() {
  let p = players[revealIndex];

  document.getElementById("currentPlayer").innerText = p.name;
  document.getElementById("secretWord").innerText = p.word;

  document.getElementById("secretWord").classList.add("hidden");
  document.getElementById("revealBtn").classList.remove("hidden");
  document.getElementById("nextBtn").classList.add("hidden");
}

// 👇 HER
function revealWord() {
  document.getElementById("secretWord").classList.remove("hidden");
  document.getElementById("revealBtn").classList.add("hidden");
  document.getElementById("nextBtn").classList.remove("hidden");
}
function nextPlayer() {
  revealIndex++;
  if (revealIndex < players.length) showWord();
  else switchScreen("reveal","game");
}

function startVoting() {
  switchScreen("game","voting");

  let container = document.getElementById("voteButtons");
  container.innerHTML = "";

  players.forEach((p,i)=>{
    let btn = document.createElement("button");
    btn.innerText = p.name;
    btn.onclick = ()=>vote(i);
    container.appendChild(btn);
  });
}

function vote(i) {
  switchScreen("voting","result");

  document.getElementById("resultText").innerText =
    imposters.includes(i) ? "Rigtigt!" : "Forkert!";

  document.getElementById("imposterList").innerText =
    "Impostere var: " + imposters.map(i => players[i].name).join(", ");
}

function switchScreen(hide, show) {
  document.getElementById(hide).classList.add("hidden");
  document.getElementById(show).classList.remove("hidden");
}

</script>
